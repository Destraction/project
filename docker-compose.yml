version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cocktail_db
    environment:
      POSTGRES_USER: cocktail_admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: cocktail_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      # pg_isready по умолчанию пытается подключаться к БД с именем пользователя,
      # а у нас такой БД нет — поэтому явно указываем POSTGRES_DB.
      test: ["CMD-SHELL", "pg_isready -U cocktail_admin -d cocktail_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cocktail_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: cocktail_backend
    user: imarkov
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://cocktail_admin:secret@db/cocktail_db
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: cocktail_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
volumes:
  postgres_data:
